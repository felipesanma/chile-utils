name: Update Boletin Concursal

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * 5"

permissions:
  contents: write

jobs:
  update-boletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download Boletin Concursal CSV
        env:
          SUPERIR_ALLOW_INSECURE_TLS: "1"
        run: python scripts/download_boletin_json.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git rm --ignore-unmatch superir/publicaciones.json superir/publicaciones.json.gz superir/publicaciones.csv
          git add superir/publicaciones.csv.gz superir/metadata.json

          if git diff --cached --quiet; then
            echo "No hay cambios en los archivos generados."
            exit 0
          fi

          git commit -m "Update Boletin Concursal data"
          git push
