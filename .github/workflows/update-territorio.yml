name: Update Territorio

on:
  workflow_dispatch:
  schedule:
    - cron: "23 9 1 * *"

permissions:
  contents: write

jobs:
  update-territorio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build territorio datasets
        env:
          DPA_ALLOW_INSECURE_TLS: "1"
        run: python scripts/build_territorio.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add territorio/regiones.json territorio/provincias.json territorio/comunas.json territorio/comunas-con-coordenadas.json

          if git diff --cached --quiet; then
            echo "No hay cambios en los datasets territoriales."
            exit 0
          fi

          git commit -m "Update territorio datasets"
          git push
